name: Naver Auto Blog

on:
  workflow_dispatch:              # GitHub UI에서 버튼 클릭으로 즉시 실행
  schedule:
    - cron: '0 */2 * * *'         # 2시간마다 (KST 기준 홀수 시각)

env:
  PYTHONIOENCODING: utf-8
  DISPLAY: :99                   # xvfb 가상 디스플레이 번호
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  naver-post:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Chrome 설치
        uses: browser-actions/setup-chrome@latest
        with:
          chrome-version: stable

      - name: 시스템 패키지 설치 (한글 폰트 + 가상 디스플레이 + 클립보드)
        run: |
          sudo apt-get install -y \
            fonts-nanum \
            xvfb \
            xclip \
            x11-utils
          fc-cache -fv
          echo "패키지 설치 완료"

      - name: 가상 디스플레이 시작 (xvfb)
        run: |
          Xvfb :99 -screen 0 1280x900x24 &
          sleep 2
          echo "xvfb 시작 완료 (DISPLAY=:99)"

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: 쿠키 복원 (GitHub Secret → 파일)
        run: |
          mkdir -p cookies
          echo "${{ secrets.NAVER_COOKIES_B64 }}" | base64 -d > cookies/naver_cookies.json
          echo "쿠키 복원 완료 ($(wc -c < cookies/naver_cookies.json) bytes)"

      - name: 네이버 블로그 자동 포스팅
        env:
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          NAVER_BLOG_ID:       ${{ secrets.NAVER_BLOG_ID }}
          NAVER_USERNAME:      ${{ secrets.NAVER_USERNAME }}
          NAVER_PASSWORD:      ${{ secrets.NAVER_PASSWORD }}
          POST_STATUS:         publish      # draft → publish 로 실제 발행
          HEADLESS:            "false"      # xvfb 가상 디스플레이 사용 (클립보드 정상 동작)
        run: python main.py

      - name: 중복 방지 이력 커밋 (recent_stocks.json)
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/recent_stocks.json
          git diff --staged --quiet || git commit -m "auto: 발행 이력 업데이트 [skip ci]"
          git push

      - name: 발행 로그 업로드 (아티팩트)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: post-log-${{ github.run_number }}
          path: |
            logs/
            debug_*.png
          retention-days: 7

      - name: 실패 시 안내
        if: failure()
        run: |
          echo "========================================"
          echo "포스팅 실패! 확인 사항:"
          echo "  1. NAVER_COOKIES_B64 만료"
          echo "     → 로컬: python main.py --login"
          echo "     → 로컬: python main.py --export-cookies"
          echo "     → GitHub Secrets: NAVER_COOKIES_B64 업데이트"
          echo "  2. ANTHROPIC_API_KEY 확인"
          echo "  3. 네이버 계정 잠금 여부 확인"
          echo "========================================"
